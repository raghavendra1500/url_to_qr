<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QRGen Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: Inter, sans-serif;
        background: #f5f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        width: 420px;
        background: #fff;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        text-align: center;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #111;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #000;
    }

    .qr img {
        width: 220px;
        margin-top: 15px;
    }

    .actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        color: white;
        text-align: center;
        font-size: 14px;
        border: none;
        cursor: pointer;
    }

    .download {
        background: #2d6cdf;
    }

    .reset {
        background: #e74c3c;
    }
</style>
</head>

<body>

<div class="box">
    <h2>QR Generator</h2>

    <form method="POST" action="/generate">
        <input type="text" name="url" placeholder="Enter URL..." required>
        <button type="submit">Generate</button>
    </form>

    {% if qr_image %}
    <div class="qr">
        <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code">
    </div>

    <div class="actions">
        <a href="/download" class="btn download">Download</a>
        <a href="/reset" class="btn reset">Reset</a>
    </div>
    {% endif %}

</div>

</body>
</html>
