<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QRGen Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f172a, #020617);
        overflow: hidden;
        color: white;
    }

    /* animated background glow */
    .bg-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
        top: -200px;
        left: -200px;
        filter: blur(60px);
        animation: move 8s infinite alternate;
    }

    @keyframes move {
        0% { transform: translate(0,0); }
        100% { transform: translate(200px,150px); }
    }

    .container {
        position: relative;
        width: 100%;
        max-width: 950px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        padding: 40px;
        z-index: 2;
    }

    /* LEFT PANEL */
    .left {
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .title {
        font-size: 3rem;
        font-weight: 700;
        background: linear-gradient(90deg, #3b82f6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        margin-top: 10px;
        color: #94a3b8;
        font-size: 1rem;
    }

    /* INPUT CARD */
    .card {
        margin-top: 20px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(20px);
        padding: 20px;
        border-radius: 16px;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03);
        color: white;
        outline: none;
    }

    input:focus {
        border-color: #38bdf8;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #3b82f6, #06b6d4);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: translateY(-2px);
    }

    /* RIGHT PANEL */
    .right {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .qr-box {
        width: 100%;
        max-width: 350px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(20px);
        border-radius: 18px;
        padding: 25px;
        text-align: center;
        animation: fade 0.6s ease;
    }

    @keyframes fade {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .qr-box img {
        width: 220px;
        border-radius: 12px;
        margin-top: 10px;
    }

    .actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        text-align: center;
        font-weight: 600;
        font-size: 14px;
    }

    .download {
        background: #22c55e;
        color: white;
    }

    .reset {
        background: #ef4444;
        color: white;
    }

    .empty {
        color: #64748b;
        font-size: 14px;
    }

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1 class="title">QRGen Pro</h1>
        <p class="subtitle">A modern QR generator built for speed, simplicity, and production-grade UX.</p>

        <div class="card">
            <form method="POST" action="/generate">
                <input type="text" name="url" placeholder="Paste your link here..." required>
                <button type="submit">Generate QR Code</button>
            </form>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">

        {% if qr_image %}
        <div class="qr-box">
            <h3>Generated QR</h3>
            <img src="data:image/png;base64,{{ qr_image }}" alt="QR">

            <div class="actions">
                <a class="btn download" href="/download">Download</a>
                <a class="btn reset" href="/reset">Reset</a>
            </div>
        </div>

        {% else %}
        <div class="qr-box">
            <p class="empty">Your QR will appear here after generation</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
